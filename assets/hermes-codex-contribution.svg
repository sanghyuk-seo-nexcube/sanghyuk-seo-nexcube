<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent open-source contribution</title>
  <desc id="desc">A Hermes Agent styled card summarizing an open-source contribution for openai-codex streaming reliability.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe100"/>
      <stop offset="54%" stop-color="#ffd000"/>
      <stop offset="100%" stop-color="#cf8327"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf2"/>
      <stop offset="100%" stop-color="#fff7cc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#111827" flood-opacity="0.22"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#f4e7a3" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1280" height="560" rx="28" fill="#111111"/>
  <rect x="0" y="0" width="1280" height="92" fill="#151515"/>
  <rect x="36" y="28" width="78" height="38" fill="#4b4b4b"/>
  <rect x="114" y="28" width="430" height="38" fill="#ffd700"/>
  <rect x="552" y="28" width="8" height="38" fill="#5b5cff"/>
  <text x="136" y="53" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800" letter-spacing="3" fill="#111111">HERMES-AGENT.NOUSRESEARCH.COM</text>

  <g filter="url(#shadow)">
    <rect x="58" y="122" width="1164" height="376" rx="26" fill="url(#paper)" stroke="#f5d94d" stroke-width="2"/>
  </g>
  <rect x="58" y="122" width="1164" height="376" rx="26" fill="url(#grid)" opacity="0.75"/>

  <g transform="translate(96 158)">
    <rect x="0" y="0" width="118" height="118" rx="20" fill="#ffffff" stroke="#111111" stroke-width="4"/>
    <circle cx="59" cy="59" r="43" fill="#111111"/>
    <text x="59" y="75" text-anchor="middle" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#ffffff">☤</text>
  </g>

  <text x="250" y="184" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="25" font-weight="800" fill="#111111">OPEN SOURCE CONTRIBUTION</text>
  <text x="250" y="235" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="48" font-weight="900" fill="#111111">Codex 스트리밍 안정화</text>
  <text x="250" y="278" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="23" font-weight="650" fill="#374151">긴 컨텍스트 prefill 지연을 TTFB 장애로 오판하던 retry 문제를 수정했습니다.</text>

  <g transform="translate(96 330)">
    <rect x="0" y="0" width="336" height="104" rx="16" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <rect x="0" y="0" width="10" height="104" rx="5" fill="url(#gold)"/>
    <text x="30" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" font-weight="850" fill="#111111">작은 요청</text>
    <text x="30" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="19" fill="#4b5563">첫 이벤트 없음 → 빠른 reconnect</text>
  </g>

  <g transform="translate(472 330)">
    <rect x="0" y="0" width="336" height="104" rx="16" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <rect x="0" y="0" width="10" height="104" rx="5" fill="url(#gold)"/>
    <text x="30" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" font-weight="850" fill="#111111">큰 Codex 요청</text>
    <text x="30" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="19" fill="#4b5563">prefill 중이면 끊지 않고 기다림</text>
  </g>

  <g transform="translate(848 330)">
    <rect x="0" y="0" width="336" height="104" rx="16" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <rect x="0" y="0" width="10" height="104" rx="5" fill="url(#gold)"/>
    <text x="30" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" font-weight="850" fill="#111111">이벤트 후 idle</text>
    <text x="30" y="72" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="19" fill="#4b5563">별도 watchdog으로 reconnect</text>
  </g>

  <text x="96" y="472" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#111111">NousResearch/hermes-agent #33390</text>
  <text x="1184" y="472" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="18" fill="#374151">original #33383 · commit 283bb810e</text>
</svg>
